# Docker Compose for Tierlist Builder
# Supports both development and production environments
# Usage:
#   Development: docker-compose up
#   Production:  DOCKER_TARGET=production docker-compose up --build
#   With local services: docker-compose --profile local-storage --profile cache up

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-development}
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      # Development only: mount source for hot reload
      - ${DOCKER_VOLUMES:-./:/app}
      - /app/node_modules
    networks:
      - tierlist-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${CADDY_ADMIN_PORT:-2019}:2019"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    depends_on:
      - app
    networks:
      - tierlist-network
    restart: unless-stopped
    profiles:
      - production

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - tierlist-network
    restart: unless-stopped
    profiles:
      - local-storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  valkey:
    image: valkey/valkey:7-alpine
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    networks:
      - tierlist-network
    restart: unless-stopped
    profiles:
      - cache
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  tierlist-network:
    driver: bridge

volumes:
  minio-data:
    driver: local
  valkey-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  caddy-logs:
    driver: local